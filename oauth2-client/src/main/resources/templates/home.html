<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Accueil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            text-align: center;
            border: 2px solid #000000;
            padding: 60px 80px;
            border-radius: 4px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 30px; }
        .btn {
            display: block;
            padding: 12px 30px;
            margin: 10px auto;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            letter-spacing: 1px;
            width: 280px;
        }
        .btn-google {
            background-color: #000000;
            color: #ffffff;
        }
        .btn-keycloak {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
<div class="card">
    <h1>Bienvenue !</h1>
    <p>Choisissez votre méthode de connexion</p>
    <a class="btn btn-google" href="/oauth2/authorization/google">
        Se connecter avec Google
    </a>
    <a class="btn btn-keycloak" href="/oauth2/authorization/keycloak">
        Se connecter avec Keycloak
    </a>
</div>
</body>
</html>
