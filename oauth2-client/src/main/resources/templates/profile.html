<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profil Utilisateur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            padding: 50px 60px;
            text-align: center;
            width: 380px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #000000;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }
        .info {
            text-align: left;
            margin-bottom: 10px;
        }
        .info label {
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }
        .info p {
            font-size: 1rem;
            margin-top: 2px;
        }
        .divider {
            border: none;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }
        .btn-logout {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .btn-logout:hover { background-color: #333333; }
    </style>
</head>
<body>
<div class="card">
    <h2 th:text="${email != null && email.contains('gmail.com')} ? 'Profil Google' : 'Profil Keycloak'">Profil</h2>

    <img class="avatar" th:src="${picture}" alt="Photo de profil"/>

    <div class="info">
        <label>Nom</label>
        <p th:text="${name} ?: 'Utilisateur Keycloak'"></p>
    </div>
    <div class="info">
        <label>Email</label>
        <p th:text="${email} ?: 'Email non renseigné'"></p>
    </div>
    <a class="btn-logout" href="/logout">Se déconnecter</a>
</div>
</body>
</html>
